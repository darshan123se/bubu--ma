<!DOCTYPE html>
<html>
<head>
<title>For Harshi ❤️</title>

<style>

body{
background:#ffd6e0;
font-family:Arial;
text-align:center;
padding-top:120px;
overflow:hidden;
}

.card{
background:white;
width:500px;
margin:auto;
padding:40px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
position:relative;
}

h1{
font-size:32px;
}

button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:30px;
cursor:pointer;
margin:10px;
}

.yes{
background:#ff4d79;
color:white;
}

.no{
background:#ddd;
position:absolute;
}

</style>
</head>

<body>

<div class="card">

<h1>Harshi, will you be my girlfriend? 💖</h1>

<button class="yes" onclick="goNext()">Yes 💖</button>

<button class="no" id="noBtn">No 🙈</button>

</div>

<script>

const noBtn = document.getElementById("noBtn")

noBtn.addEventListener("mouseover", function(){

const x = Math.random() * window.innerWidth * 0.8
const y = Math.random() * window.innerHeight * 0.8

noBtn.style.left = x + "px"
noBtn.style.top = y + "px"

})

function goNext(){
window.location.href="yes.html"
}

</script>

</body>
</html>
